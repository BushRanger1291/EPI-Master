.section{margin-top:14px;font-size:.8rem;color:#666;font-weight:bold;text-transform:uppercase}
.badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600}

function render(){
const q=document.getElementById("search").value.toLowerCase()
const container=document.getElementById("container")
container.innerHTML=""

const filtered=rawData
.filter(i=>i.code.toLowerCase().includes(q)||i.norm.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q))
.sort((a,b)=>a.code.localeCompare(b.code))

let current=null

filtered.forEach(item=>{
if(current!==item.cat){
current=item.cat
const s=document.createElement("div")
s.className="section"
s.textContent=ICONS[item.cat]+" "+item.cat
container.appendChild(s)
}

const div=document.createElement("div")
div.className="card"

const r=item.risk?`<span class="badge" style="background:${RISK[item.risk].c}22;color:${RISK[item.risk].c}">${RISK[item.risk].l}</span>`:""

div.innerHTML=`
<div class="code">${item.code} ${r}</div>
<div class="norm">${item.norm}</div>
<div class="desc">${item.desc}</div>
`
container.appendChild(div)
})
}

render()
