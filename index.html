<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10b981">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EPI Master">
<link rel="manifest" href="./manifest.json">
<title>EPI Master v6.2</title>
<style>
:root{
  --bg:#050505;--card:#161616;--accent:#10b981;--text:#eee;--border:#222;
  --risk-mec:#f59e0b;--risk-chi:#8b5cf6;--risk-the:#ef4444;
  --risk-ele:#3b82f6;--risk-bio:#22c55e;--risk-bru:#06b6d4;
  --risk-chu:#f97316;--risk-spe:#ec4899;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  padding:10px;padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  overscroll-behavior:none;
}

/* SEARCH BAR */
.search-wrap{position:relative;margin-bottom:10px}
.search{
  width:100%;padding:10px 36px 10px 10px;
  background:#111;border:1px solid #333;color:#fff;
  border-radius:6px;font-size:15px;outline:none;
  -webkit-appearance:none;
}
.search:focus{border-color:var(--accent)}
.clear-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#666;font-size:18px;cursor:pointer;
  display:none;line-height:1;padding:2px 4px;min-width:30px;min-height:30px;
}
.clear-btn:hover{color:#fff}

/* CATEGORY FILTERS */
.cat-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-btn{
  background:#111;border:1px solid #333;color:#aaa;
  padding:7px 12px;border-radius:20px;cursor:pointer;font-size:12px;
  transition:all .2s;white-space:nowrap;min-height:36px;
  -webkit-tap-highlight-color:transparent;
}
.cat-btn:hover{border-color:#555;color:#fff}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}

/* RISK FILTERS */
.risk-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.risk-btn{
  border:1px solid transparent;
  padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;
  transition:all .2s;opacity:.5;font-weight:600;min-height:32px;
  -webkit-tap-highlight-color:transparent;
}
.risk-btn:hover{opacity:.8}
.risk-btn.active{opacity:1}

/* COUNT */
.count{font-size:11px;color:#666;margin-bottom:8px}

/* CARDS */
.card{
  background:var(--card);border-left:4px solid var(--accent);
  padding:10px 10px 10px 12px;margin-bottom:8px;border-radius:6px;
  display:flex;flex-direction:column;gap:4px;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.code{font-weight:bold;font-size:14px}
.norm{font-size:.7rem;color:#999}
.desc{font-size:.8rem;margin-top:2px;color:#ccc}
.badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;align-self:flex-start;
}

/* SECTION HEADER */
.section-header{
  font-size:12px;font-weight:700;color:#555;text-transform:uppercase;
  letter-spacing:.08em;margin:14px 0 6px;padding-bottom:4px;
  border-bottom:1px solid #1e1e1e;
}

/* NO RESULT */
.no-result{text-align:center;color:#555;padding:40px 0;font-size:14px}

/* OFFLINE BANNER */
.offline-banner{
  display:none;background:#7f1d1d;color:#fca5a5;
  font-size:12px;text-align:center;padding:6px;border-radius:6px;margin-bottom:8px;
}
</style>
</head>
<body>

  <input id="search" class="search" placeholder="Rechercher un EPI, une norme..." oninput="onSearch()">
  <button class="clear-btn" id="clearBtn" onclick="clearSearch()">×</button>
</div>

<div class="cat-filters" id="catFilters"></div>
<div class="risk-filters" id="riskFilters"></div>
<div class="count" id="count"></div>
<div id="container"></div>

const CATS=Object.keys(ICONS)
let activeCat=null
let activeRisk=null

function buildFilters(){
  const cf=document.getElementById("catFilters")
  CATS.forEach(c=>{
    const b=document.createElement("button")
    b.className="cat-btn"
    b.textContent=ICONS[c]+" "+c
    b.onclick=()=>{
      activeCat=(activeCat===c)?null:c
      document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"))
      if(activeCat)b.classList.add("active")
      render()
    }
    cf.appendChild(b)
  })

  const rf=document.getElementById("riskFilters")
  Object.entries(RISK_META).forEach(([key,meta])=>{
    const b=document.createElement("button")
    b.className="risk-btn"
    b.textContent=meta.label
    b.style.color=meta.color
    b.style.borderColor=meta.color
    b.style.background=meta.bg
    b.onclick=()=>{
      activeRisk=(activeRisk===key)?null:key
      document.querySelectorAll(".risk-btn").forEach(x=>x.classList.remove("active"))
      if(activeRisk)b.classList.add("active")
      render()
    }
    rf.appendChild(b)
  })
}

function onSearch(){
  const val=document.getElementById("search").value
  document.getElementById("clearBtn").style.display=val?"block":"none"
  render()
}

function clearSearch(){
  document.getElementById("search").value=""
  document.getElementById("clearBtn").style.display="none"
  render()
}

function render(){
  const q=document.getElementById("search").value.toLowerCase().trim()
  const container=document.getElementById("container")
  container.innerHTML=""

  let filtered=rawData.filter(item=>{
    const matchQ=!q||(
      item.code.toLowerCase().includes(q)||
      item.norm.toLowerCase().includes(q)||
      item.desc.toLowerCase().includes(q)
    )
    const matchCat=!activeCat||(item.cat===activeCat)
    const matchRisk=!activeRisk||(item.risk===activeRisk)
    return matchQ&&matchCat&&matchRisk
  })

  document.getElementById("count").textContent=
    filtered.length===0?"":filtered.length+" EPI trouvé"+(filtered.length>1?"s":"")

  if(filtered.length===0){
    container.innerHTML='<div class="no-result">Aucun résultat pour cette recherche.</div>'
    return
  }

  const grouped={}
  filtered.forEach(item=>{
    if(!grouped[item.cat])grouped[item.cat]=[]
    grouped[item.cat].push(item)
  })

  CATS.forEach(cat=>{
    if(!grouped[cat])return
    const h=document.createElement("div")
    h.className="section-header"
    h.textContent=ICONS[cat]+" "+cat
    container.appendChild(h)

    grouped[cat].forEach(item=>{
      const div=document.createElement("div")
      div.className="card"
      const risk=item.risk&&RISK_META[item.risk]
      div.innerHTML=`
        <div class="card-top">
          <div class="code">${item.code}</div>
          ${risk?`<span class="badge" style="color:${risk.color};background:${risk.bg};border:1px solid ${risk.color}33">${risk.label}</span>`:""}
        </div>
        <div class="norm">${item.norm}</div>
        <div class="desc">${item.desc}</div>
      `
      container.appendChild(div)
    })
  })
}

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .catch(err=>console.warn('SW non enregistré:',err))
  })
}

// Bannière offline
window.addEventListener('online', ()=>{ document.getElementById("offlineBanner").style.display="none" })
window.addEventListener('offline',()=>{ document.getElementById("offlineBanner").style.display="block" })

buildFilters()
render()
</script>
</body>
</html>
