<style>
:root{--bg:#050505;--card:#161616;--accent:#10b981;--text:#eee;--border:#222}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:10px;overscroll-behavior:none}
.search-wrap{position:relative;margin-bottom:10px}
.search{width:100%;padding:12px;background:#111;border:1px solid #333;color:#fff;border-radius:6px;font-size:16px;outline:none;-webkit-appearance:none}
.search:focus{border-color:var(--accent)}
.cat-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-btn{background:#111;border:1px solid #333;color:#aaa;padding:7px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.risk-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.risk-btn{border:1px solid transparent;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;transition:all .2s;opacity:.5;font-weight:600}
.risk-btn.active{opacity:1}
.count{font-size:11px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.card{background:var(--card);border-left:4px solid var(--accent);padding:10px;margin-bottom:8px;border-radius:6px;display:flex;flex-direction:column;gap:4px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.code{font-weight:bold;font-size:14px;color:#fff}
.norm{font-size:.7rem;color:#999}
.desc{font-size:.8rem;color:#ccc}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.section-header{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #1e1e1e}
.no-result{text-align:center;color:#555;padding:40px 0}
</style>

let activeCat=null,activeRisks=[];
function buildFilters(){
  const cf=document.getElementById("catFilters"),rf=document.getElementById("riskFilters");
  cf.innerHTML="";rf.innerHTML="";
  Object.keys(ICONS).forEach(c=>{
    const b=document.createElement("button");b.className="cat-btn";b.textContent=ICONS[c]+" "+c;
    b.onclick=()=>{activeCat=(activeCat===c)?null:c;document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"));if(activeCat)b.classList.add("active");render()};
    cf.appendChild(b)
  });
  Object.entries(RISK_META).forEach(([k,m])=>{
    const b=document.createElement("button");b.className="risk-btn";b.textContent=m.label;b.style.color=m.color;b.style.borderColor=m.color;b.style.background=m.bg;
    b.onclick=()=>{if(activeRisks.includes(k)){activeRisks=activeRisks.filter(x=>x!==k);b.classList.remove("active")}else{activeRisks.push(k);b.classList.add("active")}render()};
    rf.appendChild(b)
  })
}

function render(){
  const q=document.getElementById("search").value.toLowerCase().trim(),container=document.getElementById("container");
  container.innerHTML="";
  const filtered=rawData.filter(i=>{
    const mQ=!q||i.code.toLowerCase().includes(q)||i.norm.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q);
    const mC=!activeCat||i.cat===activeCat,mR=activeRisks.length===0||activeRisks.includes(i.risk);
    return mQ&&mC&&mR
  });
  document.getElementById("count").textContent=filtered.length?"":filtered.length+" EPI trouvé"+(filtered.length>1?"s":"");
  if(!filtered.length){container.innerHTML='<div class="no-result">Aucun résultat correspondant.</div>';return}
  const grouped={};filtered.forEach(i=>{if(!grouped[i.cat])grouped[i.cat]=[];grouped[i.cat].push(i)});
  Object.keys(ICONS).forEach(cat=>{
    if(!grouped[cat])return;
    const h=document.createElement("div");h.className="section-header";h.textContent=ICONS[cat]+" "+cat;container.appendChild(h);
    grouped[cat].forEach(i=>{
      const d=document.createElement("div");d.className="card";const r=i.risk&&RISK_META[i.risk];
      d.innerHTML=`<div class="card-top"><div class="code">${i.code}</div>${r?`<span class="badge" style="color:${r.color};background:${r.bg};border:1px solid ${r.color}33">${r.label}</span>`:""}</div><div class="norm">${i.norm}</div><div class="desc">${i.desc}</div>`;
      container.appendChild(d)
    })
  })
}
window.onload=()=>{counter=document.getElementById("count");searchInput=document.getElementById("search");container=document.getElementById("container");buildFilters();render();};
