<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10b981">
<link rel="manifest" href="./manifest.json">
<title>EPI Master v12.0</title>

<style>
:root{--bg:#050505;--card:#161616;--accent:#10b981;--text:#eee}
body{font-family:Segoe UI,sans-serif;background:var(--bg);color:var(--text);padding:10px}

.search{width:100%;padding:10px;background:#111;border:1px solid #333;color:#fff;margin:10px 0;border-radius:6px}

.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter{padding:6px 8px;border:1px solid #333;border-radius:20px;cursor:pointer;font-size:12px}
.filter.active{background:#10b981;color:#000;border-color:#10b981}

.card{background:var(--card);border-left:4px solid var(--accent);padding:10px;margin-bottom:8px;border-radius:6px}
.code{font-weight:bold}
.norm{font-size:.75rem;color:#999}
.desc{font-size:.85rem;margin-top:4px;color:#ccc}

.section{margin-top:14px;font-size:.8rem;color:#666;font-weight:bold;text-transform:uppercase}

.badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;margin-left:6px}
</style>

</head>

<body>

<div id="catFilters" class="filters"></div>
<div id="riskFilters" class="filters"></div>

<input id="search" class="search" placeholder="Recherche..." oninput="render()">

<div id="container"></div>

<script>

const ICONS={
"Tête":"🪖","Yeux":"🥽","Audition":"🎧","Respiratoire":"😷",
"Mains":"🧤","Corps":"🦺","Pieds":"👟","Chute":"🪢",
"Peau":"🧴","Spécifique":"☢️"
}

const RISK={
mecanique:{icon:"🟠",l:"Mécanique",c:"#f59e0b"},
chimie:{icon:"🧪",l:"Chimique",c:"#8b5cf6"},
thermique:{icon:"🔥",l:"Thermique",c:"#ef4444"},
elec:{icon:"⚡",l:"Électrique",c:"#3b82f6"},
bio:{icon:"🦠",l:"Biologique",c:"#22c55e"},
bruit:{icon:"🔊",l:"Bruit",c:"#06b6d4"},
chute:{icon:"🪢",l:"Chute",c:"#f97316"},
spe:{icon:"☢️",l:"Spécifique",c:"#ec4899"},
vibration:{icon:"📳",l:"Vibration",c:"#a78bfa"}
}

let activeRisks=[]
let activeCats=[]

function buildCatFilters(){
const container=document.getElementById("catFilters")
Object.keys(ICONS).forEach(cat=>{
const btn=document.createElement("div")
btn.className="filter"
btn.textContent=ICONS[cat]+" "+cat
btn.onclick=()=>{
if(activeCats.includes(cat)){
activeCats=activeCats.filter(c=>c!==cat)
btn.classList.remove("active")
}else{
activeCats.push(cat)
btn.classList.add("active")
}
render()
}
container.appendChild(btn)
})
}

function buildRiskFilters(){
const container=document.getElementById("riskFilters")
Object.keys(RISK).forEach(key=>{
const btn=document.createElement("div")
btn.className="filter"
btn.textContent=RISK[key].icon+" "+RISK[key].l
btn.onclick=()=>{
if(activeRisks.includes(key)){
activeRisks=activeRisks.filter(r=>r!==key)
btn.classList.remove("active")
}else{
activeRisks.push(key)
btn.classList.add("active")
}
render()
}
container.appendChild(btn)
})
}

const rawData=[
{cat:"Tête",code:"EN 397",norm:"Casque industrie",desc:"Chutes objets",risk:"mecanique"},
{cat:"Tête",code:"EN 12492",norm:"Casque hauteur",desc:"Jugulaire",risk:"chute"},
{cat:"Yeux",code:"EN 166",norm:"Protection oculaire",desc:"Générale",risk:"mecanique"},
{cat:"Audition",code:"EN 352-1",norm:"Casque antibruit",desc:"Protection",risk:"bruit"},
{cat:"Respiratoire",code:"EN 149",norm:"FFP",desc:"Masques",risk:"bio"},
{cat:"Mains",code:"EN 388",norm:"Mécanique",desc:"Protection",risk:"mecanique"},
{cat:"Corps",code:"EN ISO 20471",norm:"Haute visibilité",desc:"Classe 1-3",risk:"mecanique"},
{cat:"Pieds",code:"EN ISO 20345",norm:"S3",desc:"Chaussures",risk:"mecanique"},
{cat:"Chute",code:"EN 361",norm:"Harnais",desc:"Protection",risk:"chute"},
{cat:"Spécifique",code:"EN 1073",norm:"Nucléaire",desc:"Protection",risk:"spe"}
]

function render(){
const q=document.getElementById("search").value.toLowerCase()
const container=document.getElementById("container")
container.innerHTML=""

const filtered=rawData.filter(i=>{
const matchSearch=i.code.toLowerCase().includes(q)||i.norm.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)
const matchRisk=activeRisks.length===0 || activeRisks.includes(i.risk)
const matchCat=activeCats.length===0 || activeCats.includes(i.cat)
return matchSearch && matchRisk && matchCat
})

let current=null

filtered.forEach(item=>{
if(current!==item.cat){
current=item.cat
const s=document.createElement("div")
s.className="section"
s.textContent=ICONS[item.cat]+" "+item.cat
container.appendChild(s)
}

const div=document.createElement("div")
div.className="card"

const risk=item.risk?`<span class="badge" style="background:${RISK[item.risk].c}22;color:${RISK[item.risk].c}">
${RISK[item.risk].icon} ${RISK[item.risk].l}</span>`:""

div.innerHTML=`
<div class="code">${item.code}${risk}</div>
<div class="norm">${item.norm}</div>
<div class="desc">${item.desc}</div>
`

container.appendChild(div)
})
}

buildCatFilters()
buildRiskFilters()
render()

</script>

</body>
</html>
