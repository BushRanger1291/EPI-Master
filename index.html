<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<title>EPI Master v1.0</title>
<style>
:root{--bg:#050505;--card:#111;--accent:#3b82f6;--text:#eee;--border:#222;--dim:#666;--highlight:#22c55e;--warn:#f97316}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:10px;display:flex;justify-content:center}
.app{width:100%;max-width:500px;background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.5);min-height:90vh;display:flex;flex-direction:column}
.header{background:#000;padding:15px;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100}
h1{font-size:.8rem;color:var(--accent);text-align:center;margin:0 0 10px 0;text-transform:uppercase;letter-spacing:2px}
.search-box{width:100%;background:#1a1a1a;border:1px solid #333;padding:12px;color:#fff;border-radius:8px;font-size:1rem;outline:none;box-sizing:border-box}
.search-box:focus{border-color:var(--accent)}
.content{padding:15px;flex-grow:1;overflow-y:auto}
.cat-section{margin-bottom:20px}
.cat-title{font-size:.7rem;color:var(--dim);text-transform:uppercase;font-weight:900;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:5px;display:flex;justify-content:space-between}
.epi-card{background:#161616;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:10px;transition:0.2s}
.epi-card.match{border-color:var(--accent);background:#1a1f26}
.epi-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.epi-code{font-family:monospace;font-size:1.1rem;color:var(--highlight);font-weight:bold}
.epi-norm{font-size:.65rem;background:#333;padding:2px 6px;border-radius:4px;color:#fff}
.epi-desc{font-size:.85rem;color:#ccc;line-height:1.4}
.epi-detail{font-size:.75rem;color:var(--dim);margin-top:8px;padding-top:8px;border-top:1px dotted #333}
.no-result{text-align:center;color:var(--dim);margin-top:50px;font-size:.9rem}
.tag{display:inline-block;font-size:.6rem;padding:1px 4px;border-radius:3px;margin-right:4px;background:#222;color:var(--accent);border:1px solid var(--accent)}
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>EPI Master v1.0</h1>
        <input type="text" id="search" class="search-box" placeholder="Chercher S3, FFP2, EN 388, Chimie..." oninput="filter()">
    </div>
    <div class="content" id="container">
        </div>
</div>

<script>
const data = [
    // PIEDS
    {cat:"Pieds", code:"S1", norm:"EN ISO 20345", desc:"Embout 200J, Arrière fermé, Antistatique, Absorption d'énergie au talon.", tags:["chaussure","coque"]},
    {cat:"Pieds", code:"S1P", norm:"EN ISO 20345", desc:"S1 + Semelle anti-perforation.", tags:["chaussure","chantier"]},
    {cat:"Pieds", code:"S2", norm:"EN ISO 20345", desc:"S1 + Tige hydrofuge (WRU).", tags:["chaussure","humide"]},
    {cat:"Pieds", code:"S3", norm:"EN ISO 20345", desc:"S2 + Semelle anti-perforation + Semelle à crampons.", tags:["chaussure","total"]},
    {cat:"Pieds", code:"HRO", norm:"EN ISO 20345", desc:"Semelle résistante à la chaleur par contact (300°C pendant 60s).", tags:["chaussure","chaleur"]},
    {cat:"Pieds", code:"HI", norm:"EN ISO 20345", desc:"Isolation du complexe de semelle contre la chaleur.", tags:["chaussure"]},
    {cat:"Pieds", code:"CI", norm:"EN ISO 20345", desc:"Isolation du complexe de semelle contre le froid.", tags:["chaussure","froid"]},
    
    // MAINS - MECANIQUE
    {cat:"Mains", code:"EN 388", norm:"Mécanique", desc:"Protection contre l'abrasion, coupure, déchirure, perforation.", detail:"Marquage: [0-4][0-5][0-4][0-4][A-F][P]. Ex: 4X42C.", tags:["gant","mecanique"]},
    {cat:"Mains", code:"EN 511", norm:"Froid", desc:"Protection contre le froid convectif, de contact et perméabilité à l'eau.", tags:["gant","froid"]},
    
    // MAINS - CHIMIE (Lettres)
    {cat:"Mains (Chimie)", code:"A", norm:"EN 374", desc:"Méthanol (Alcool primaire).", tags:["chimie"]},
    {cat:"Mains (Chimie)", code:"F", norm:"EN 374", desc:"Toluène (Hydrocarbure aromatique).", tags:["chimie"]},
    {cat:"Mains (Chimie)", code:"J", norm:"EN 374", desc:"n-Heptane (Hydrocarbure saturé).", tags:["chimie"]},
    {cat:"Mains (Chimie)", code:"K", norm:"EN 374", desc:"Soude caustique 40% (Base inorganique).", tags:["chimie"]},
    {cat:"Mains (Chimie)", code:"L", norm:"EN 374", desc:"Acide sulfurique 96% (Acide inorganique).", tags:["chimie"]},
    {cat:"Mains (Chimie)", code:"M", norm:"EN 374", desc:"Acide nitrique 65%.", tags:["chimie"]},
    
    // RESPIRATOIRE
    {cat:"Respiration", code:"FFP1", norm:"EN 149", desc:"Poussières fines et brouillards aqueux ou huileux (VME x4).", tags:["masque","poussiere"]},
    {cat:"Respiration", code:"FFP2", norm:"EN 149", desc:"Poussières toxiques, fumées métalliques, virus (VME x10).", tags:["masque","toxic"]},
    {cat:"Respiration", code:"FFP3", norm:"EN 149", desc:"Hautement toxique, Amiante, Bactéries, Virus (VME x50).", tags:["masque","amiante"]},
    {cat:"Respiration", code:"Type A", norm:"Marron", desc:"Gaz et vapeurs organiques (solvants) - Point ébullition > 65°C.", tags:["cartouche","solvant"]},
    {cat:"Respiration", code:"Type B", norm:"Gris", desc:"Gaz et vapeurs inorganiques (sauf CO).", tags:["cartouche"]},
    {cat:"Respiration", code:"Type K", norm:"Vert", desc:"Ammoniac et dérivés organiques aminés.", tags:["cartouche","ammoniac"]},
    
    // TÊTE
    {cat:"Tête", code:"EN 397", norm:"Casque", desc:"Casque de protection pour l'industrie (chocs verticaux).", tags:["casque"]},
    {cat:"Tête", code:"EN 812", norm:"Casquette", desc:"Casquette anti-heurt (chocs contre objets fixes uniquement).", tags:["casquette"]},
    
    // YEUX
    {cat:"Yeux", code:"EN 166", norm:"Oculaire", desc:"Spécifications générales pour la protection des yeux.", detail:"F: Impact faible (45m/s) | B: Moyen (120m/s) | A: Haute (190m/s) | 3: Liquides | 9: Métal fondu.", tags:["lunettes","visiere"]},
    
    // OUIE
    {cat:"Ouïe", code:"SNR", norm:"EN 352", desc:"Single Number Rating. Valeur globale d'atténuation du bruit.", tags:["bouchon","casque","bruit"]},
    
    // CORPS
    {cat:"Corps", code:"EN ISO 20471", norm:"Haute Visibilité", desc:"Vêtements de signalisation. Classe 1 (Min), 2, 3 (Max).", tags:["gilet","fluo"]},
    {cat:"Corps", code:"Type 5", norm:"EN ISO 13982", desc:"Étanche aux particules solides (poussières).", tags:["combinaison"]},
    {cat:"Corps", code:"Type 6", norm:"EN 13034", desc:"Protection limitée contre les produits chimiques liquides (éclaboussures).", tags:["combinaison"]},
    
    // CHUTE
    {cat:"Antichute", code:"EN 361", norm:"Harnais", desc:"Harnais d'antichute complet (seule norme pour arrêt de chute).", tags:["harnais","hauteur"]},
    {cat:"Antichute", code:"EN 355", norm:"Absorbeur", desc:"Absorbeurs d'énergie. Limite la force de choc sous 6kN.", tags:["longe","chute"]}
];

function filter() {
    const query = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('container');
    container.innerHTML = '';

    const categories = [...new Set(data.map(item => item.cat))];

    let hasResult = false;
    categories.forEach(cat => {
        const items = data.filter(i => i.cat === cat && (
            i.code.toLowerCase().includes(query) || 
            i.desc.toLowerCase().includes(query) || 
            i.norm.toLowerCase().includes(query) ||
            i.tags.some(t => t.includes(query))
        ));

        if (items.length > 0) {
            hasResult = true;
            const sec = document.createElement('div');
            sec.className = 'cat-section';
            sec.innerHTML = `<div class="cat-title">${cat} <span>${items.length}</span></div>`;
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'epi-card' + (query !== '' ? ' match' : '');
                card.innerHTML = `
                    <div class="epi-head">
                        <span class="epi-code">${item.code}</span>
                        <span class="epi-norm">${item.norm}</span>
                    </div>
                    <div class="epi-desc">${item.desc}</div>
                    ${item.detail ? `<div class="epi-detail">${item.detail}</div>` : ''}
                `;
                sec.appendChild(card);
            });
            container.appendChild(sec);
        }
    });

    if (!hasResult) {
        container.innerHTML = `<div class="no-result">Aucun EPI ou norme ne correspond à "${query}"</div>`;
    }
}

// Initialisation
window.onload = filter;
</script>
</body>
</html>
